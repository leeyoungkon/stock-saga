apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-saga
  namespace: kafka
  labels:
    app: stock-saga
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stock-saga
  template:
    metadata:
      labels:
        app: stock-saga
    spec:
      containers:
        - name: stock-saga
          image: yklee2002/stock-saga:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: my-cluster-kafka-bootstrap.kafka:9092
            - name: MYSQL_HOST
              value: mysql.default.svc.cluster.local
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_DATABASE
              value: stockdb
            - name: MYSQL_USER
              value: root
            - name: MYSQL_PASSWORD
              value: root1234
---
apiVersion: v1
kind: Service
metadata:
  name: stock-saga-service
  namespace: kafka
  labels:
    app: stock-saga
spec:
  type: NodePort
  selector:
    app: stock-saga
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30302
